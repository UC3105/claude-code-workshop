name: Claude Code PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  claude-review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Add Claude Code review comment
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const prNumber = context.payload.pull_request.number;
            const prTitle = context.payload.pull_request.title;
            const prBody = context.payload.pull_request.body || '';
            const author = context.payload.pull_request.user.login;

            // Get PR diff stats
            const { data: files } = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
            });

            const additions = files.reduce((sum, file) => sum + file.additions, 0);
            const deletions = files.reduce((sum, file) => sum + file.deletions, 0);
            const fileCount = files.length;

            const comment = `## 🤖 Claude Code PR Review

Thank you for your contribution, @${author}!

### PR Summary
- **Files changed**: ${fileCount}
- **Lines added**: +${additions}
- **Lines removed**: -${deletions}

### Review Checklist
- [ ] Code follows project conventions
- [ ] All tests pass
- [ ] Documentation is updated
- [ ] No security vulnerabilities introduced

### How to Request a Review
You can mention **@Claude** in a comment to request detailed feedback on specific aspects:
- \`@Claude review this for security issues\`
- \`@Claude check the performance implications\`
- \`@Claude suggest improvements\`

*This is an automated comment from the Claude Code integration.*`;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body: comment,
            });
