name: Claude Code Mentions

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  handle-mention:
    runs-on: ubuntu-latest
    if: contains(github.event.comment.body, '@Claude')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: React to mention
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const comment = context.payload.comment;
            const commentBody = comment.body;
            const author = comment.user.login;

            // Add reaction to the mention
            await github.rest.reactions.createForIssueComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: comment.id,
              content: 'eyes',
            });

            // Parse the request
            let responseMessage = '';

            if (commentBody.toLowerCase().includes('review')) {
              responseMessage = `@${author} I've noted your review request. To get a detailed code review, you can:\n\n1. Use Claude Code CLI: Run \`claude /code-review\` in your local repository\n2. Use the \`/review\` slash command in Claude Code\n3. Ask specific questions about the code changes\n\nFor automated reviews on every commit, consider adding pre-commit hooks with Claude Code.`;
            } else if (commentBody.toLowerCase().includes('help')) {
              responseMessage = `@${author} Here are some things I can help with:\n\n- **Code Review**: Mention \`@Claude review this\` for review requests\n- **Security**: Mention \`@Claude check security\` for security analysis\n- **Performance**: Mention \`@Claude analyze performance\` for optimization suggestions\n- **Documentation**: Mention \`@Claude document this\` for doc generation\n\nYou can also use Claude Code locally for more interactive assistance!`;
            } else {
              responseMessage = `@${author} I see you mentioned me! 👋\n\nI'm Claude Code's GitHub integration. For the most powerful experience, use the [Claude Code CLI](https://claude.com/claude-code) locally.\n\n**Quick tips:**\n- Use \`@Claude help\` to see what I can do\n- Use \`@Claude review this\` for code review requests\n- Run \`claude /review\` locally for detailed analysis`;
            }

            // Post response
            const issueNumber = context.payload.issue?.number || context.payload.pull_request?.number;
            if (issueNumber) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                body: responseMessage,
              });
            }
